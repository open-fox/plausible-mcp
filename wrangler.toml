name = "plausible-mcp"
main = "src/worker.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat_v2"]

# Set these via `wrangler secret put PLAUSIBLE_API_KEY`
# or in the Cloudflare dashboard under Settings > Variables

routes = [
  { pattern = "plausible-mcp.mksaas.com", custom_domain = true }
]

[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 60, period = 60 }

[vars]
PLAUSIBLE_BASE_URL = "https://pa.indieapp.site"
PLAUSIBLE_DEFAULT_SITE_ID = "mkimage.ai"
